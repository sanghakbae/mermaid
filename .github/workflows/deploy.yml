name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Firebase 웹 설정값은 공개 키입니다(클라이언트 번들에 노출되는 것이 정상).
          # 실제 보안은 Firestore 규칙 + 승인된 도메인으로 처리합니다.
          VITE_FIREBASE_API_KEY: AIzaSyAy60nDIXKVBa-OLmRZ3qTsrLeD6DO_V9k
          VITE_FIREBASE_AUTH_DOMAIN: mermaid-editor-8e902.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: mermaid-editor-8e902
          VITE_FIREBASE_STORAGE_BUCKET: mermaid-editor-8e902.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "1039819574932"
          VITE_FIREBASE_APP_ID: 1:1039819574932:web:455577e5926ed1abe5ee81
          VITE_FIREBASE_MEASUREMENT_ID: G-63SFY5SBQ2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
